<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miami Eats — Saved Spots</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --sand: #e8dcc8;
    --terracotta: #c0674a;
    --rust: #8b3a22;
    --teal: #2a6b6e;
    --dark: #1a1814;
    --gold: #c9a84c;
    --muted: #7a7060;
    --white: #fefcf8;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–cream);
color: var(–dark);
min-height: 100vh;
}

header {
background: var(–white);
padding: 20px 40px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 100;
border-bottom: 2px solid var(–terracotta);
box-shadow: 0 2px 12px rgba(0,0,0,0.07);
}

header h1 {
font-family: ‘Playfair Display’, serif;
font-size: 1.7rem;
color: var(–dark);
letter-spacing: 0.02em;
}

header h1 span {
color: var(–terracotta);
font-style: italic;
}

.header-right {
display: flex;
gap: 10px;
align-items: center;
}

.tab-btn {
background: transparent;
border: 1.5px solid var(–sand);
color: var(–dark);
padding: 8px 20px;
border-radius: 4px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.85rem;
letter-spacing: 0.06em;
text-transform: uppercase;
transition: all 0.2s;
}
.tab-btn.active, .tab-btn:hover {
border-color: var(–terracotta);
color: var(–terracotta);
background: rgba(192,103,74,0.08);
}

.main-layout {
max-width: 1400px;
margin: 0 auto;
padding: 32px 24px;
}

/* CONTROLS */
.controls {
display: flex;
gap: 12px;
margin-bottom: 28px;
flex-wrap: wrap;
align-items: center;
}

.search-box {
flex: 1;
min-width: 200px;
padding: 10px 16px;
border: 1.5px solid var(–sand);
background: var(–white);
border-radius: 6px;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.9rem;
color: var(–dark);
outline: none;
transition: border-color 0.2s;
}
.search-box:focus { border-color: var(–terracotta); }

.filter-pill {
padding: 8px 16px;
border-radius: 20px;
border: 1.5px solid var(–sand);
background: var(–white);
cursor: pointer;
font-size: 0.82rem;
font-weight: 500;
color: var(–muted);
transition: all 0.2s;
white-space: nowrap;
}
.filter-pill.active {
background: var(–terracotta);
border-color: var(–terracotta);
color: white;
}
.filter-pill:hover:not(.active) {
border-color: var(–terracotta);
color: var(–terracotta);
}

.stats-bar {
display: flex;
gap: 24px;
margin-bottom: 24px;
padding: 16px 20px;
background: var(–white);
border-radius: 8px;
border-left: 3px solid var(–terracotta);
}
.stat { font-size: 0.85rem; color: var(–muted); }
.stat strong { color: var(–dark); font-weight: 600; }

/* GRID VIEW */
.grid-view { display: block; }

.category-section {
margin-bottom: 36px;
}

.category-header {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 16px;
padding-bottom: 10px;
border-bottom: 1px solid var(–sand);
}

.category-icon { font-size: 1.3rem; }

.category-title {
font-family: ‘Playfair Display’, serif;
font-size: 1.2rem;
color: var(–terracotta);
}

.category-count {
background: var(–sand);
color: var(–muted);
padding: 2px 10px;
border-radius: 12px;
font-size: 0.78rem;
font-weight: 500;
}

.cards-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 16px;
}

.card {
background: var(–white);
border-radius: 10px;
padding: 18px;
border: 1px solid var(–sand);
transition: all 0.22s;
cursor: pointer;
position: relative;
}
.card:hover {
transform: translateY(-2px);
box-shadow: 0 6px 24px rgba(0,0,0,0.08);
border-color: var(–terracotta);
}

.card-top {
display: flex;
justify-content: space-between;
align-items: flex-start;
margin-bottom: 8px;
}

.card-name {
font-family: ‘Playfair Display’, serif;
font-size: 1rem;
color: var(–dark);
line-height: 1.3;
flex: 1;
padding-right: 8px;
}

.visited-badge {
width: 22px;
height: 22px;
border-radius: 50%;
border: 2px solid var(–sand);
background: transparent;
cursor: pointer;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.75rem;
transition: all 0.2s;
}
.visited-badge.done {
background: var(–teal);
border-color: var(–teal);
color: white;
}

.card-address {
font-size: 0.78rem;
color: var(–muted);
margin-bottom: 10px;
line-height: 1.4;
}

.card-meta {
display: flex;
gap: 10px;
align-items: center;
flex-wrap: wrap;
margin-bottom: 10px;
}

.rating-badge {
display: flex;
align-items: center;
gap: 4px;
font-size: 0.8rem;
font-weight: 600;
color: var(–gold);
}

.price-badge {
font-size: 0.78rem;
color: var(–muted);
font-weight: 500;
}

.distance-badge {
font-size: 0.78rem;
color: var(–teal);
font-weight: 500;
background: rgba(42,107,110,0.08);
padding: 2px 8px;
border-radius: 10px;
}

.hours-row {
display: flex;
align-items: center;
gap: 6px;
margin-top: 8px;
font-size: 0.78rem;
}

.open-dot {
width: 7px;
height: 7px;
border-radius: 50%;
background: #4caf7d;
flex-shrink: 0;
}
.closed-dot {
width: 7px;
height: 7px;
border-radius: 50%;
background: #c0674a;
flex-shrink: 0;
}

.hours-text { color: var(–muted); }

.card-phone {
font-size: 0.75rem;
color: var(–muted);
margin-top: 4px;
}

/* MODAL */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(26,24,20,0.7);
z-index: 200;
align-items: center;
justify-content: center;
padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal {
background: var(–white);
border-radius: 14px;
max-width: 520px;
width: 100%;
padding: 28px;
max-height: 80vh;
overflow-y: auto;
position: relative;
}

.modal-close {
position: absolute;
top: 16px;
right: 16px;
background: none;
border: none;
cursor: pointer;
font-size: 1.4rem;
color: var(–muted);
line-height: 1;
}

.modal-name {
font-family: ‘Playfair Display’, serif;
font-size: 1.5rem;
margin-bottom: 4px;
}

.modal-category-tag {
display: inline-block;
background: var(–terracotta);
color: white;
font-size: 0.75rem;
padding: 3px 12px;
border-radius: 12px;
margin-bottom: 14px;
text-transform: uppercase;
letter-spacing: 0.06em;
}

.modal-section-title {
font-weight: 600;
font-size: 0.8rem;
text-transform: uppercase;
letter-spacing: 0.08em;
color: var(–muted);
margin: 16px 0 8px;
}

.hours-table { width: 100%; }
.hours-table tr td { padding: 3px 0; font-size: 0.85rem; }
.hours-table tr td:first-child { color: var(–muted); width: 110px; }
.hours-table tr td:last-child { font-weight: 500; }

.today-hours {
background: rgba(201,168,76,0.1);
border-left: 3px solid var(–gold);
padding: 6px 12px;
border-radius: 0 6px 6px 0;
margin-bottom: 12px;
font-size: 0.85rem;
}

.today-hours strong { color: var(–dark); }

.modal-map-link {
display: inline-flex;
align-items: center;
gap: 6px;
margin-top: 16px;
padding: 10px 20px;
background: var(–teal);
color: white;
text-decoration: none;
border-radius: 6px;
font-size: 0.85rem;
font-weight: 500;
transition: background 0.2s;
}
.modal-map-link:hover { background: #1e5052; }

.empty-state {
text-align: center;
padding: 60px 20px;
color: var(–muted);
font-style: italic;
font-family: ‘Playfair Display’, serif;
font-size: 1.1rem;
}

/* MAP VIEW */
#map-view { display: none; }
#map-view.active { display: block; }
.grid-view.hidden { display: none; }

#map {
width: 100%;
height: 600px;
border-radius: 10px;
border: 1px solid var(–sand);
}

.map-legend {
display: flex;
flex-wrap: wrap;
gap: 12px;
margin-top: 16px;
padding: 16px;
background: var(–white);
border-radius: 8px;
border: 1px solid var(–sand);
}

.legend-item {
display: flex;
align-items: center;
gap: 6px;
font-size: 0.8rem;
color: var(–muted);
}

.legend-dot {
width: 12px;
height: 12px;
border-radius: 50%;
flex-shrink: 0;
}

/* BISCAYNE PARK ref */
.biscayne-note {
font-size: 0.82rem;
color: var(–muted);
margin-top: 10px;
font-style: italic;
}

/* DAY SELECTOR */
.day-selector {
display: flex;
gap: 6px;
align-items: center;
margin-bottom: 20px;
flex-wrap: wrap;
}
.day-label {
font-size: 0.78rem;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.08em;
color: var(–muted);
margin-right: 4px;
}
.day-btn {
padding: 6px 14px;
border-radius: 20px;
border: 1.5px solid var(–sand);
background: var(–white);
cursor: pointer;
font-size: 0.82rem;
font-weight: 600;
color: var(–muted);
transition: all 0.18s;
font-family: ‘DM Sans’, sans-serif;
}
.day-btn:hover:not(.active) { border-color: var(–gold); color: var(–dark); }
.day-btn.active {
background: var(–dark);
border-color: var(–dark);
color: var(–cream);
}

/* HOURS WARNING on cards */
.hours-warning {
display: inline-flex;
align-items: center;
gap: 4px;
font-size: 0.74rem;
color: #b85c20;
background: rgba(192,103,74,0.1);
padding: 2px 8px;
border-radius: 10px;
margin-top: 4px;
font-weight: 500;
}
.closed-day-banner {
background: rgba(192,103,74,0.08);
border: 1px solid rgba(192,103,74,0.25);
border-radius: 8px;
padding: 8px 12px;
font-size: 0.78rem;
color: #8b3a22;
margin-top: 6px;
font-weight: 500;
}

/* Modal hours table highlight */
.hours-table tr.trip-day td { background: rgba(201,168,76,0.1); font-weight: 600; }
.hours-table tr.trip-day td:first-child::after { content: ’ ✈’; }

/* Trip hours summary in modal */
.trip-hours-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 6px;
margin-top: 4px;
}
.trip-hour-cell {
background: var(–cream);
border-radius: 6px;
padding: 6px 10px;
font-size: 0.8rem;
}
.trip-hour-cell .day-name { font-weight: 600; color: var(–dark); font-size: 0.75rem; }
.trip-hour-cell .day-time { color: var(–muted); margin-top: 1px; }
.trip-hour-cell.closed-cell { opacity: 0.5; }
.trip-hour-cell.closed-cell .day-time { color: var(–terracotta); }
.trip-hour-cell.diff-cell { border-left: 3px solid var(–gold); }

@media (max-width: 600px) {
header { padding: 16px 18px; }
header h1 { font-size: 1.2rem; }
.main-layout { padding: 16px 12px; }
.cards-grid { grid-template-columns: 1fr; }
.controls { gap: 8px; }
}
</style>

</head>
<body>

<header>
  <h1>Miami <span>Eats</span></h1>
  <div class="header-right">
    <button class="tab-btn active" id="btn-list" onclick="showView('list')">List</button>
    <button class="tab-btn" id="btn-map" onclick="showView('map')">Map</button>
  </div>
</header>

<div class="main-layout">

  <div class="controls">
    <input class="search-box" type="text" id="search" placeholder="Search spots…" oninput="filterCards()">
    <button class="filter-pill active" onclick="setFilter('all', this)">All</button>
    <button class="filter-pill" onclick="setFilter('Cuban & Latin', this)">🇨🇺 Cuban & Latin</button>
    <button class="filter-pill" onclick="setFilter('Pizza', this)">🍕 Pizza</button>
    <button class="filter-pill" onclick="setFilter('Bakery & Pastry', this)">🥐 Bakery</button>
    <button class="filter-pill" onclick="setFilter('Coffee', this)">☕ Coffee</button>
    <button class="filter-pill" onclick="setFilter('Bars & Cocktails', this)">🍹 Bars</button>
    <button class="filter-pill" onclick="setFilter('Seafood & Grill', this)">🦐 Seafood</button>
    <button class="filter-pill" onclick="setFilter('Markets & Specialty', this)">🧺 Markets</button>
    <button class="filter-pill" onclick="setFilter('visited', this)">✅ Visited</button>
  </div>

  <div class="day-selector">
    <span class="day-label">📅 Trip day:</span>
    <button class="day-btn active" onclick="setDay('all', this)">All days</button>
    <button class="day-btn" onclick="setDay('Wed', this)">Wed</button>
    <button class="day-btn" onclick="setDay('Thu', this)">Thu</button>
    <button class="day-btn" onclick="setDay('Fri', this)">Fri</button>
    <button class="day-btn" onclick="setDay('Sat', this)">Sat</button>
    <button class="day-btn" onclick="setDay('Sun', this)">Sun</button>
  </div>

  <div class="day-selector" style="margin-bottom:12px">
    <span class="day-label">↕ Sort by:</span>
    <button class="day-btn active" id="sort-rating" onclick="setSort('rating', this)">⭐ Rating</button>
    <button class="day-btn" id="sort-distance" onclick="setSort('distance', this)">📍 Distance</button>
    <button class="day-btn" id="sort-price-asc" onclick="setSort('price-asc', this)">$ Price ↑</button>
    <button class="day-btn" id="sort-price-desc" onclick="setSort('price-desc', this)">$ Price ↓</button>
  </div>

  <div class="stats-bar">
    <div class="stat">Total <strong id="stat-total">37</strong> spots</div>
    <div class="stat">Showing <strong id="stat-showing">37</strong></div>
    <div class="stat">Visited <strong id="stat-visited">0</strong></div>
    <div class="stat">📍 Distance from <strong>Biscayne Park</strong></div>
  </div>

  <div class="grid-view" id="list-view"></div>

  <div id="map-view">
    <div id="map"></div>
    <div class="biscayne-note">📍 Blue marker = Biscayne Park reference point (NE Miami)</div>
    <div class="map-legend" id="map-legend"></div>
  </div>

</div>

<!-- Modal -->

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let visited = JSON.parse(localStorage.getItem('miami_visited') || '{}');
let currentView = 'list';
let selectedDay = 'all';
let currentSort = 'rating';

const TRIP_DAYS = ['Wed','Thu','Fri','Sat','Sun'];
const PRICE_ORDER = { '$': 1, '$$': 2, '$$$': 3, '$$$$': 4 };

function setSort(sort, btn) {
  currentSort = sort;
  document.querySelectorAll('#sort-rating, #sort-distance, #sort-price-asc, #sort-price-desc')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function sortItems(items) {
  return [...items].sort((a, b) => {
    if (currentSort === 'rating') return b.rating - a.rating;
    if (currentSort === 'distance') {
      return haversine(BISCAYNE_PARK.lat, BISCAYNE_PARK.lng, a.lat, a.lng)
           - haversine(BISCAYNE_PARK.lat, BISCAYNE_PARK.lng, b.lat, b.lng);
    }
    if (currentSort === 'price-asc') return (PRICE_ORDER[a.price] || 2) - (PRICE_ORDER[b.price] || 2);
    if (currentSort === 'price-desc') return (PRICE_ORDER[b.price] || 2) - (PRICE_ORDER[a.price] || 2);
    return 0;
  });
}
function setDay(day, btn) {
  selectedDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ─── DISTANCE ───────────────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 3958.8; // miles
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ─── TODAY'S HOURS ────────────────────────────────────────────────────────────
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function todayKey() { return DAYS[new Date().getDay()]; }

// ─── RENDER ──────────────────────────────────────────────────────────────────
function getFilteredPlaces() {
  const q = document.getElementById('search').value.toLowerCase();
  return PLACES.filter(p => {
    const matchCat = currentFilter === 'all' ? true :
                     currentFilter === 'visited' ? !!visited[p.name] :
                     p.cat === currentFilter;
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.address.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function renderList() {
  const filtered = getFilteredPlaces();
  const container = document.getElementById('list-view');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">No spots match your search…</div>';
    updateStats(filtered);
    return;
  }

  // Group by category
  const grouped = {};
  filtered.forEach(p => {
    if (!grouped[p.cat]) grouped[p.cat] = [];
    grouped[p.cat].push(p);
  });

  let html = '';
  const catOrder = Object.keys(CATEGORIES);
  catOrder.forEach(cat => {
    if (!grouped[cat]) return;
    const info = CATEGORIES[cat];
    const items = sortItems(grouped[cat]);
    html += `
      <div class="category-section">
        <div class="category-header">
          <span class="category-icon">${info.icon}</span>
          <span class="category-title">${cat}</span>
          <span class="category-count">${items.length}</span>
        </div>
        <div class="cards-grid">
          ${items.map(p => cardHTML(p)).join('')}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
  updateStats(filtered);
}

function getHoursForDay(hours, day) {
  if (!hours) return 'Unknown';
  const DORD = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const cur = DORD.indexOf(day);
  for (const h of hours) {
    if (h.includes('Mon–Sun') || h.includes('Mon-Sun')) return h.replace(/Mon[–-]Sun:\s*/, '');
    if (h.startsWith(day + ':')) return h.split(': ').slice(1).join(': ').trim();
    const rangeMatch = h.match(/^([A-Z][a-z]+)[–-]([A-Z][a-z]+):\s*(.+)/);
    if (rangeMatch) {
      const s = DORD.indexOf(rangeMatch[1]), e = DORD.indexOf(rangeMatch[2]);
      if (s !== -1 && e !== -1 && cur >= s && cur <= e) return rangeMatch[3];
    }
  }
  return 'Closed';
}

// Returns true if hours differ across trip days (ignoring all-same and all-closed)
function hasDiffHours(hours) {
  const dayHours = TRIP_DAYS.map(d => getHoursForDay(hours, d));
  const open = dayHours.filter(h => h !== 'Closed');
  if (open.length === 0) return false;
  return new Set(open).size > 1;
}

function cardHTML(p) {
  const dist = haversine(BISCAYNE_PARK.lat, BISCAYNE_PARK.lng, p.lat, p.lng).toFixed(1);
  const isVisited = visited[p.name];

  // Determine what hours to show on card
  let displayDay = selectedDay === 'all' ? null : selectedDay;
  let hoursLine = '';
  let warningLine = '';

  if (displayDay) {
    const h = getHoursForDay(p.hours, displayDay);
    const isClosed = h === 'Closed';
    hoursLine = `
      <div class="hours-row" style="margin-top:8px">
        <div class="${isClosed ? 'closed-dot' : 'open-dot'}"></div>
        <span class="hours-text">${displayDay}: <strong>${h}</strong></span>
      </div>`;
    if (isClosed) {
      warningLine = `<div class="closed-day-banner">⚠️ Closed on ${displayDay}</div>`;
    }
  } else {
    // Show trip-day overview: compact inline
    const tripSummary = TRIP_DAYS.map(d => {
      const h = getHoursForDay(p.hours, d);
      return h === 'Closed' ? `<span style="color:var(--terracotta)">${d}:✕</span>` : `<span>${d}:✓</span>`;
    }).join(' ');

    const closedDays = TRIP_DAYS.filter(d => getHoursForDay(p.hours, d) === 'Closed');
    const diffHours = hasDiffHours(p.hours);

    hoursLine = `<div style="font-size:0.75rem;color:var(--muted);margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">${tripSummary}</div>`;

    if (closedDays.length > 0) {
      warningLine = `<div class="hours-warning">⚠️ Closed: ${closedDays.join(', ')}</div>`;
    } else if (diffHours) {
      warningLine = `<div class="hours-warning">🕐 Hours vary by day</div>`;
    }
  }

  return `
    <div class="card" onclick="openModal('${p.name.replace(/'/g,"\\'")}')">
      <div class="card-top">
        <div class="card-name">${p.name}</div>
        <div class="visited-badge ${isVisited ? 'done' : ''}" 
             onclick="event.stopPropagation(); toggleVisited('${p.name.replace(/'/g,"\\'")}', this)"
             title="${isVisited ? 'Mark unvisited' : 'Mark visited'}">
          ${isVisited ? '✓' : ''}
        </div>
      </div>
      <div class="card-address">${p.address}</div>
      <div class="card-meta">
        <span class="rating-badge">★ ${p.rating}</span>
        <span class="price-badge">${p.price || '—'}</span>
        <span class="distance-badge">${dist} mi away</span>
      </div>
      ${hoursLine}
      ${warningLine}
      ${p.phone ? `<div class="card-phone" style="margin-top:4px">${p.phone}</div>` : ''}
    </div>
  `;
}

function getTodayHours(hours) {
  if (!hours) return 'Unknown';
  const today = todayKey();
  for (const h of hours) {
    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    for (const d of days) {
      if (h.startsWith(d + ':') || h.startsWith(d + '–') || h.startsWith(d + '-') ||
          (h.includes('Mon–Sun') || h.includes('Mon-Sun'))) {
        if (h.includes('Mon–Sun') || h.includes('Mon-Sun')) {
          return h.replace(/Mon[–-]Sun:\s*/, '');
        }
        if (h.startsWith(today + ':')) return h.replace(today + ': ', '');
        // check ranges
        const rangeMatch = h.match(/^([A-Z][a-z]+)[–-]([A-Z][a-z]+):\s*(.+)/);
        if (rangeMatch) {
          const start = days.indexOf(rangeMatch[1]);
          const end = days.indexOf(rangeMatch[2]);
          const cur = days.indexOf(today);
          if (start !== -1 && end !== -1 && cur >= start && cur <= end) return rangeMatch[3];
        }
      }
    }
  }
  // fallback: look for today's name directly
  const todayFull = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
  for (const h of hours) {
    if (h.startsWith(today) || h.startsWith(todayFull)) {
      const parts = h.split(': ');
      return parts.length > 1 ? parts.slice(1).join(': ') : h;
    }
  }
  return 'See hours';
}

function updateStats(filtered) {
  document.getElementById('stat-total').textContent = PLACES.length;
  document.getElementById('stat-showing').textContent = filtered.length;
  document.getElementById('stat-visited').textContent = Object.keys(visited).filter(k=>visited[k]).length;
}

function toggleVisited(name, el) {
  visited[name] = !visited[name];
  localStorage.setItem('miami_visited', JSON.stringify(visited));
  el.classList.toggle('done', visited[name]);
  el.textContent = visited[name] ? '✓' : '';
  updateStats(getFilteredPlaces());
  if (currentFilter === 'visited') renderList();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards() {
  renderList();
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(name) {
  const p = PLACES.find(x => x.name === name);
  if (!p) return;
  const dist = haversine(BISCAYNE_PARK.lat, BISCAYNE_PARK.lng, p.lat, p.lng).toFixed(1);
  const catInfo = CATEGORIES[p.cat];

  // Trip days grid
  const tripDayHours = TRIP_DAYS.map(d => {
    const h = getHoursForDay(p.hours, d);
    const isClosed = h === 'Closed';
    // detect if this day differs from baseline (Wed)
    const wedH = getHoursForDay(p.hours, 'Wed');
    const isDiff = !isClosed && h !== wedH && d !== 'Wed';
    return `
      <div class="trip-hour-cell ${isClosed ? 'closed-cell' : ''} ${isDiff ? 'diff-cell' : ''}">
        <div class="day-name">${d}</div>
        <div class="day-time">${h}</div>
      </div>`;
  }).join('');

  const hoursRows = p.hours.map(h => `<tr><td>${h.split(':')[0]}</td><td>${h.split(':').slice(1).join(':').trim()}</td></tr>`).join('');

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-name">${p.name}</div>
    <span class="modal-category-tag">${catInfo.icon} ${p.cat}</span>
    <p style="font-size:0.85rem;color:var(--muted);margin-bottom:4px;">📍 ${p.address}</p>
    <p style="font-size:0.85rem;color:var(--teal);margin-bottom:4px;">📏 ${dist} miles from Biscayne Park</p>
    ${p.phone ? `<p style="font-size:0.85rem;color:var(--muted);margin-bottom:4px">📞 ${p.phone}</p>` : ''}

    <div class="modal-section-title">✈️ Trip Hours (Wed – Sun)</div>
    <div class="trip-hours-grid">${tripDayHours}</div>
    <p style="font-size:0.72rem;color:var(--muted);margin-top:6px;">🟡 Gold left border = hours differ from Wednesday</p>

    <div class="modal-section-title">Full Weekly Hours</div>
    <table class="hours-table">${hoursRows}</table>

    <div style="margin-top:16px">
      <a class="modal-map-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name + ' ' + p.address)}" target="_blank">
        🗺 Open in Google Maps
      </a>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

// ─── MAP ─────────────────────────────────────────────────────────────────────
let mapInitialized = false;
let leafletMap = null;

function initMap() {
  if (mapInitialized) return;
  mapInitialized = true;

  // Load Leaflet
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
  document.head.appendChild(link);

  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
  script.onload = () => {
    leafletMap = L.map('map').setView([25.8, -80.2], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(leafletMap);

    // Biscayne Park marker
    const bpIcon = L.divIcon({
      html: '<div style="background:#2a6b6e;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4)"></div>',
      iconSize: [16, 16], iconAnchor: [8, 8]
    });
    L.marker([BISCAYNE_PARK.lat, BISCAYNE_PARK.lng], { icon: bpIcon })
     .addTo(leafletMap)
     .bindPopup('<strong>📍 Biscayne Park</strong><br>Your reference point');

    // Place markers
    const colorMap = {
      "Cuban & Latin": "#c0674a",
      "Pizza": "#8b3a22",
      "Bakery & Pastry": "#c9a84c",
      "Coffee": "#6b4c30",
      "Bars & Cocktails": "#2a6b6e",
      "Seafood & Grill": "#1e5052",
      "Markets & Specialty": "#5a7a3a",
    };

    PLACES.forEach(p => {
      const color = colorMap[p.cat] || '#888';
      const dist = haversine(BISCAYNE_PARK.lat, BISCAYNE_PARK.lng, p.lat, p.lng).toFixed(1);
      const icon = L.divIcon({
        html: `<div style="background:${color};width:12px;height:12px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,
        iconSize: [12, 12], iconAnchor: [6, 6]
      });
      L.marker([p.lat, p.lng], { icon })
       .addTo(leafletMap)
       .bindPopup(`
         <strong>${p.name}</strong><br>
         <span style="color:#888;font-size:0.8em">${p.cat}</span><br>
         ★ ${p.rating} · ${p.price || '—'}<br>
         📏 ${dist} mi from Biscayne Park<br>
         <em style="font-size:0.8em">${p.address}</em>
       `);
    });

    // Legend
    const legendEl = document.getElementById('map-legend');
    legendEl.innerHTML = '<span style="font-size:0.82rem;font-weight:600;color:#1a1814;margin-right:8px">Categories:</span>' +
      Object.entries(colorMap).map(([cat, color]) =>
        `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${CATEGORIES[cat].icon} ${cat}</div>`
      ).join('') +
      `<div class="legend-item"><div class="legend-dot" style="background:#2a6b6e"></div>📍 Biscayne Park</div>`;
  };
  document.head.appendChild(script);
}

function showView(v) {
  currentView = v;
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  document.getElementById('btn-map').classList.toggle('active', v === 'map');
  document.getElementById('list-view').classList.toggle('hidden', v !== 'list');
  document.getElementById('map-view').classList.toggle('active', v === 'map');
  if (v === 'map') initMap();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderList();
</script>

</body>
</html>
